<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact Me</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #0f0f0f;
      color: white;
      font-family: Arial;
    }

    .navbar {
      background: #111;
    }

    .highlight {
      color: #00d4ff;
    }

    .contact-box {
      background: #1c1c1c;
      padding: 30px;
      border-radius: 15px;
      border: 1px solid rgba(255,255,255,0.05);
    }

    /* 🔥 FIX INPUT TEXT VISIBILITY */
    .form-control {
      background: #2a2a2a;
      border: 1px solid #444;
      color: white;
      padding: 10px;
    }

    .form-control::placeholder {
      color: #bbbbbb;
    }

    .form-control:focus {
      background: #2a2a2a;
      color: white;
      border: 1px solid #00d4ff;
      box-shadow: none;
    }

    .btn-custom {
      background: #00d4ff;
      color: black;
      font-weight: bold;
      border: none;
      border-radius: 25px;
    }

    .btn-custom:hover {
      background: white;
    }

    .info {
      font-size: 14px;
      opacity: 0.8;
      margin-top: 15px;
    }
  </style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-dark">
  <div class="container">
    <a class="navbar-brand" href="index.html">Aaisha.dev</a>

    <div>
      <a class="text-white me-3" href="index.html">Home</a>
      <a class="text-white me-3" href="About.html">About</a>
      <a class="text-white me-3" href="projects.html">Projects</a>
      <a class="text-white me-3" href="contact.html">Contact</a>
    </div>
  </div>
</nav>

<!-- Contact -->
<div class="container text-center mt-5">

  <h1>Contact <span class="highlight">Me</span> 📩</h1>
  <p>Send me a message — I will reply soon 🚀</p>

  <div class="row justify-content-center mt-4">
    <div class="col-md-6">

      <div class="contact-box">

        <form action="https://formspree.io/f/mgoqzgya" method="POST">

          <input type="hidden" name="_captcha" value="false">

          <input type="text" name="name" class="form-control mb-3" placeholder="Your Name" required>

          <input type="email" name="email" class="form-control mb-3" placeholder="Your Email" required>

          <textarea name="message" rows="4" class="form-control mb-3" placeholder="Your Message" required></textarea>

          <button type="submit" class="btn btn-custom w-100">
            Send Message 🚀
          </button>

        </form>

        <div class="info">
          📧 <i class="bi bi-envelope-fill"></i> Email:: aaishavahora83@gmail.com <br>
          📍 Location: Anand, India
        </div>

      </div>

    </div>
  </div>
</div>

</body>
</html>
